name: Build APK from React
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package.json

      - name: Build React app
        working-directory: web
        run: |
          npm install
          npm run build || npx vite build || true
          if [ ! -d "dist" ]; then
            mkdir -p dist
            cp -r * dist/ 2>/dev/null || true
          fi

      - name: Copy web build to Android assets
        run: |
          mkdir -p app/src/main/assets
          cp -r web/dist/* app/src/main/assets/

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar"

      - name: Accept SDK licenses
        run: |
          SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          yes | $SDKMANAGER --licenses || true
          $SDKMANAGER "platforms;android-34" "build-tools;34.0.0"

      - name: Add app icon
        run: |
          pip install Pillow -q
          python3 - <<'EOF'
import base64, os
from PIL import Image
import io

logo_b64 = ""
logo_bytes = base64.b64decode(logo_b64)

dpi_sizes = [("mdpi",48),("hdpi",72),("xhdpi",96),("xxhdpi",144),("xxxhdpi",192)]
for dpi, size in dpi_sizes:
    d = f"app/src/main/res/mipmap-{dpi}"
    os.makedirs(d, exist_ok=True)
    with Image.open(io.BytesIO(logo_bytes)) as img:
        img = img.convert("RGBA").resize((size,size), Image.LANCZOS)
        img.save(f"{d}/ic_launcher.png","PNG")
        img.save(f"{d}/ic_launcher_round.png","PNG")
print("✅ Icons generated")
EOF

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
